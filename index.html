<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Job Tracker</title>
      <link rel="shortcut icon" href="./assest/favicon.png" type="image/x-icon">
      <link rel="stylesheet" href="style.css">
      <!-- DaisyUI link -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"
         type="text/css" />
      <script
         src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

      <!-- google font -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link
         href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@100..800&family=Dancing+Script:wght@400..700&family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
         rel="stylesheet">
   </head>
   <body class="container mx-auto max-w-[1110px] ">
      <section class="grid md:grid-cols-3 gap-4 my-8 ">

         <div class="bg-white shadow p-6 rounded-lg">
            <h2 class="text-gray-500">Total</h2>
            <p id="total-count" class="text-3xl font-bold">8</p>
         </div>

         <div class="shadow p-6 rounded-lg">
            <h2 class="text-gray-500">Interview</h2>
            <p id="interview-count" class="text-3xl font-bold">0</p>
         </div>

         <div class="shadow p-6 rounded-lg">
            <h2 class="text-gray-500">Rejected</h2>
            <p id="rejected-count" class="text-3xl font-bold">0</p>
         </div>

      </section>
   </body>
</html>
