<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Job Tracker</title>
      <link rel="shortcut icon" href="./assest/favicon.png" type="image/x-icon">
      <link rel="stylesheet" href="style.css">
      <!-- DaisyUI link -->
      <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"
         type="text/css" />
      <script
         src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
      <!-- cdn -->
      <link rel="stylesheet"
         href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
         integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
         crossorigin="anonymous" referrerpolicy="no-referrer" />

      <!-- google font -->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link
         href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@100..800&family=Dancing+Script:wght@400..700&family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
         rel="stylesheet">
   </head>
   <body class="container mx-auto max-w-[1110px]  ">
      <h1 class="font-bold text-[32px] text-[#002C5C] mt-[60px]">Job Application
         Tracker</h1>
      <!-- card item -->
      <section class="grid md:grid-cols-3 gap-[16px] my-8  ">
         <div
            class="bg-white shadow p-6 rounded-lg space-y-4 text[16px] text-[#323B49] font-medium cursor-pointer">
            <h2 class="text-gray-500">Total</h2>
            <p id="total-count"
               class="text-[24px] font-bold text-[#002B70]">8</p>
         </div>
         <div
            class="bg-white shadow p-6 rounded-lg space-y-4 text[16px] text-[#323B49] font-medium cursor-pointer">
            <h2 class="text-gray-500">Interview</h2>
            <p id="total-count"
               class="text-[24px] font-bold text-[#10B981]">0</p>
         </div>
         <div
            class="bg-white shadow p-6 rounded-lg space-y-4 text[16px] text-[#323B49] font-medium cursor-pointer">
            <h2 class="text-gray-500">Rejected</h2>
            <p id="total-count"
               class="text-[24px] font-bold text-[#EF4444]">0</p>
         </div>

      </section>
      <div class="border-b-1 border-[#E6E7E9]"></div>
      <section>
         <!-- title -->
         <div class="jobs-title flex justify-between mt-[30px]"><h1
               class="font-semibold text-[20px] text-[#002C5C]">Available
               Jobs</h1>
            <p class="text-[#323B49]">8 Jobs</p>
         </div>

         <!-- tab -->
         <div class>
            <div class="tabs tabs-boxed mb-6 gap-[8px] mt-[24px]">
               <p
                  class="bg-btn-soft shadow p-2 w-[80px] text-center text-[12px] font-semibold rounded-lg cursor-pointer text-[#64748B] hover:bg-[#3B82F6] hover:text-white transition">All</p>
               <p
                  class="bg-btn-soft shadow p-2 w-[80px] text-center text-[12px] text-[#64748B] font-semibold rounded-lg cursor-pointer hover:bg-[#3B82F6] hover:text-white transition">Interview</p>
               <p
                  class="bg-btn-soft shadow p-2 w-[80px] text-center text-[12px] text-[#64748B] font-semibold rounded-lg cursor-pointer hover:bg-[#3B82F6] hover:text-white transition ">Rejected</p>
            </div>
         </div>
         <div
            class="no-jobs-part bg-white shadow h-[400px] p-[24px] space-y-5 items-center justify-center text-center">
            <img class="mx-auto justify-between items-center mt-[111px]"
               src="./assest/jobs.png" alt>
            <h1 class="font-semibold text-[24px] text-[#002C5C]">No jobs
               available</h1>
            <p class="font-normal text-[16px] text-[#64748B]">Check back soon
               for new job opportunities</p>
         </div>
      </section>

      <script src="./script/machine.js"></script>
      <script src="./script/app.js"></script>
   </body>
</html>
